services:
  postgres:
    image: postgres:16
    ports:
      - 5432:5432
    environment:
      POSTGRES_DB: skyplanner
      POSTGRES_USER: skyplanner
      POSTGRES_PASSWORD: skyplanner
    volumes:
      - postgres_data:/var/lib/postgresql/data
  redis:
    image: redis:7
    ports:
      - 6379:6379

volumes:
  postgres_data: